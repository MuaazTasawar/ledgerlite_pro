<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LedgerLite Pro — Cryptographic merchant ledger">
  <title>LedgerLite Pro</title>
  <base href="$FLUTTER_BASE_HREF">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png"/>
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      background-color: #0E1A14;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #loading {
      text-align: center;
      color: #4CDB96;
    }

    #loading .logo {
      width: 64px;
      height: 64px;
      background: #1B8A5A;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }

    #loading h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    #loading p {
      margin: 0;
      font-size: 13px;
      color: #4CDB9699;
    }

    #loading .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #1B8A5A33;
      border-top-color: #4CDB96;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 20px auto 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading splash shown before Flutter initializes -->
  <div id="loading">
    <div class="logo">🔒</div>
    <h2>LedgerLite Pro</h2>
    <p>Initializing crypto engine...</p>
    <div class="spinner"></div>
  </div>

  <!-- Go WASM runtime support -->
  <script src="wasm_exec.js"></script>

  <!-- Load Go WASM engine -->
  <script>
    const wasmReady = new Promise((resolve, reject) => {
      const go = new Go();
      WebAssembly.instantiateStreaming(
        fetch('assets/assets/go_engine.wasm'),
        go.importObject
      ).then(result => {
        go.run(result.instance);
        console.log('[LedgerLite] Go WASM engine loaded');
        resolve(true);
      }).catch(err => {
        console.warn('[LedgerLite] Go WASM failed to load:', err);
        // App still runs — falls back to Dart verification
        resolve(false);
      });
    });

    window._wasmReady = wasmReady;
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Hide loading screen when Flutter is ready -->
  <script>
    window.addEventListener('flutter-first-frame', function() {
      const loading = document.getElementById('loading');
      if (loading) {
        loading.style.transition = 'opacity 0.4s';
        loading.style.opacity = '0';
        setTimeout(() => loading.remove(), 400);
      }
    });
  </script>

</body>
</html>
